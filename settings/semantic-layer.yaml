# Semantic Layer — 데이터 웨어하우스 스키마 정의
# Data Agent가 SQL을 생성할 때 참조하는 테이블/메트릭 정보

database: snowflake
schema: airflux_prod

tables:
  events:
    description: "앱 이벤트 로그 (설치, 가입, 구매 등)"
    columns:
      - name: event_id
        type: STRING
        description: "이벤트 고유 ID"
      - name: app_id
        type: INTEGER
        description: "앱 ID"
      - name: user_id
        type: STRING
        description: "사용자 ID"
      - name: event_name
        type: STRING
        description: "이벤트 이름 (install, sign_up, purchase, etc.)"
      - name: event_timestamp
        type: TIMESTAMP
        description: "이벤트 발생 시각"
      - name: revenue
        type: FLOAT
        description: "매출 금액 (구매 이벤트만)"
      - name: platform
        type: STRING
        description: "플랫폼 (ios, android, web)"
      - name: country
        type: STRING
        description: "국가 코드 (KR, US, JP 등)"

  users:
    description: "사용자 프로필"
    columns:
      - name: user_id
        type: STRING
        description: "사용자 고유 ID"
      - name: app_id
        type: INTEGER
        description: "앱 ID"
      - name: first_seen
        type: TIMESTAMP
        description: "최초 접속 시각"
      - name: last_seen
        type: TIMESTAMP
        description: "마지막 접속 시각"
      - name: platform
        type: STRING
        description: "주 사용 플랫폼"
      - name: country
        type: STRING
        description: "국가"

  apps:
    description: "등록된 앱 목록"
    columns:
      - name: app_id
        type: INTEGER
        description: "앱 ID"
      - name: app_name
        type: STRING
        description: "앱 이름"
      - name: created_at
        type: TIMESTAMP
        description: "앱 등록일"
      - name: status
        type: STRING
        description: "상태 (active, inactive)"

metrics:
  DAU:
    description: "일간 활성 사용자 수"
    sql: "COUNT(DISTINCT user_id) FROM events WHERE DATE(event_timestamp) = :date AND app_id = :app_id"

  MAU:
    description: "월간 활성 사용자 수"
    sql: "COUNT(DISTINCT user_id) FROM events WHERE DATE_TRUNC('month', event_timestamp) = :month AND app_id = :app_id"

  revenue:
    description: "매출 합계"
    sql: "SUM(revenue) FROM events WHERE event_name = 'purchase' AND app_id = :app_id AND event_timestamp BETWEEN :start AND :end"

  installs:
    description: "앱 설치 수"
    sql: "COUNT(*) FROM events WHERE event_name = 'install' AND app_id = :app_id AND event_timestamp BETWEEN :start AND :end"

  retention_d7:
    description: "7일 리텐션율"
    sql: "COUNT(DISTINCT CASE WHEN DATE(event_timestamp) = DATEADD('day', 7, :cohort_date) THEN user_id END) * 100.0 / NULLIF(COUNT(DISTINCT CASE WHEN DATE(event_timestamp) = :cohort_date THEN user_id END), 0)"
