# Chief Agent — CEO/라우터. 모든 쿼리의 진입점
- name: chief-agent
  enabled: true
  provider: claude
  description: 'AB180 Airflux CEO 에이전트 — 사용자 요청을 이해하고 직접 처리하거나 전문 에이전트에 위임'
  model: default
  skills: []
  tools:
    - getTimestamp
    - calculate
    - formatJson
    - httpGet
    - lookupTerm
    - findTermsInQuery
    - searchDocs
    - getAgentInfo
    - getSystemInfo
    - normalizeTime
    - extractTimeFromQuery
    - readFile
    - listFiles
    - renderChart
    - generateChartData
    - sendAgentMessage
    - getAgentMessages
  maxSteps: 8
  temperature: 0
  advisor:
    model: powerful
    maxUses: 2
  subagents:
    - name: data-query
      description: '데이터 조회/분석 전문 서브에이전트. SQL 생성, 비용 최적화, 메트릭 계산.'
      prompt: '데이터 분석 전문가. 테이블 우선순위: tens > hundreds > millions > billions. billions는 app_id + event_date 필수.'
      model: default
      tools: [getSemanticLayer, getTableSchema, getMetricSQL, queryData, normalizeTime, calculate]
    - name: code-search
      description: 'Airflux 레포 코드/설계 문서 검색 서브에이전트.'
      prompt: 'Airflux 프로젝트의 설계 문서, CLAUDE.md, 스키마 파일을 검색합니다.'
      model: fast
      tools: [searchDocs, getAgentInfo, getSystemInfo]

# Ops Agent — COO. 시스템 헬스, 메시지 처리, 모니터링 (상시가동)
- name: ops-agent
  enabled: true
  provider: claude
  description: 'Operations 에이전트 — 시스템 상태 모니터링, 에이전트 간 메시지 처리, 이상 감지'
  model: fast
  skills: []
  tools:
    - getTimestamp
    - getAgentInfo
    - getSystemInfo
    - httpGet
    - sendAgentMessage
    - getAgentMessages
  maxSteps: 5
  temperature: 0

