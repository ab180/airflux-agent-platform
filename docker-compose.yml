services:
  server:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      # - ANTHROPIC_API_KEY=sk-ant-...
      # - ADMIN_API_KEY=your-secret
      # - SLACK_BOT_TOKEN=xoxb-...
      # - SLACK_SIGNING_SECRET=...
    volumes:
      - airflux-data:/app/data
      - ./settings:/app/settings

volumes:
  airflux-data:
